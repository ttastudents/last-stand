<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AnonTokenX — Liên hệ mua bản quyền</title>
  <meta name="description" content="Liên hệ mua bản quyền AnonTokenX Layer 7 Protection." />
  <style>
    :root {
      --bg: #04070f;
      --panel: rgba(8, 14, 27, 0.74);
      --line: rgba(148, 197, 255, 0.14);
      --text: #eaf3ff;
      --muted: #93a7c6;
      --cyan: #28e0ff;
      --blue: #3f7dff;
      --violet: #8a5cff;
      --green: #39ffb2;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at 15% 20%, rgba(63, 125, 255, 0.16), transparent 30%),
        radial-gradient(circle at 85% 15%, rgba(138, 92, 255, 0.14), transparent 25%),
        radial-gradient(circle at 50% 100%, rgba(40, 224, 255, 0.10), transparent 30%),
        var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .aurora {
      position: absolute;
      width: 58vmax;
      height: 58vmax;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.22;
      mix-blend-mode: screen;
      animation: drift 18s ease-in-out infinite alternate;
    }

    .aurora.one {
      background: radial-gradient(circle at 30% 30%, var(--cyan), transparent 60%);
      top: -22vmax;
      left: -16vmax;
    }

    .aurora.two {
      background: radial-gradient(circle at 70% 70%, var(--violet), transparent 60%);
      bottom: -24vmax;
      right: -16vmax;
      animation-delay: -6s;
    }

    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.14;
      mask-image: radial-gradient(circle at center, black 0%, transparent 78%);
    }

    @keyframes drift {
      from {
        transform: translate3d(0, 0, 0) scale(1);
      }

      to {
        transform: translate3d(4vmax, -3vmax, 0) scale(1.08);
      }
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(760px, 100%);
    }

    .card {
      position: relative;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)),
        var(--panel);
      border: 1px solid var(--line);
      border-radius: 34px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      overflow: hidden;
      padding: clamp(30px, 6vw, 58px);
      text-align: center;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(
        120deg,
        rgba(40, 224, 255, 0.55),
        rgba(255, 255, 255, 0.06) 25%,
        rgba(138, 92, 255, 0.55) 50%,
        rgba(255, 255, 255, 0.06) 75%,
        rgba(57, 255, 178, 0.45)
      );
      background-size: 250% 250%;
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.6;
      animation: borderMove 10s linear infinite;
    }

    @keyframes borderMove {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .glow {
      position: absolute;
      top: -35%;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 180px;
      background: radial-gradient(closest-side, rgba(40, 224, 255, 0.22), transparent);
      filter: blur(30px);
      pointer-events: none;
    }

    .logo {
      width: 84px;
      height: 84px;
      margin: 0 auto 22px;
      border-radius: 26px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(40, 224, 255, 0.18), rgba(138, 92, 255, 0.18));
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow:
        inset 0 0 30px rgba(40, 224, 255, 0.12),
        0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .logo svg {
      width: 42px;
      height: 42px;
    }

    .brand {
      display: inline-block;
      margin-bottom: 10px;
      font-size: 0.88rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 900;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 4rem);
      line-height: 1.05;
      letter-spacing: -0.045em;
      font-weight: 1000;
      margin-bottom: 14px;
    }

    .accent {
      background: linear-gradient(90deg, var(--cyan), var(--blue), var(--violet));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 40px rgba(63, 125, 255, 0.25);
    }

    .subtitle {
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.15rem);
      line-height: 1.7;
      max-width: 620px;
      margin: 0 auto 28px;
    }

    .contact-box {
      display: grid;
      gap: 14px;
      justify-items: center;
      margin-top: 10px;
    }

    .contact-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid rgba(57, 255, 178, 0.24);
      background: rgba(57, 255, 178, 0.08);
      color: #d9ffee;
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: 0.02em;
    }

    .phone {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      min-height: 64px;
      padding: 16px 28px;
      border-radius: 22px;
      text-decoration: none;
      font-size: clamp(1.3rem, 4vw, 2rem);
      font-weight: 1000;
      letter-spacing: 0.02em;
      color: #04121a;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      box-shadow: 0 16px 40px rgba(47, 125, 255, 0.35);
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .phone:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .phone:active {
      transform: translateY(0);
    }

    .phone svg {
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
    }

    .note {
      color: #8ea3c5;
      font-size: 0.92rem;
      max-width: 560px;
      margin: 0 auto;
    }

    footer {
      margin-top: 26px;
      color: #65789a;
      font-size: 0.86rem;
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true">
    <div class="aurora one"></div>
    <div class="aurora two"></div>
    <div class="grid-overlay"></div>
  </div>

  <main class="shell">
    <section class="card">
      <div class="glow" aria-hidden="true"></div>

      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path
            d="M12 2l7 3v6c0 4.7-3 8.7-7 11-4-2.3-7-6.3-7-11V5l7-3z"
            stroke="#28e0ff"
            stroke-width="1.6"
            fill="rgba(40,224,255,0.08)"
          />
          <path
            d="M8.5 12l2.3 2.3L15.5 9.5"
            stroke="#39ffb2"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </div>

      <div class="brand">AnonTokenX</div>

      <h1>
        Layer 7<br />
        <span class="accent">Protection</span>
      </h1>

      <p class="subtitle">
        Trang giới thiệu thương mại. Vui lòng liên hệ để mua bản quyền.
      </p>

      <div class="contact-box">
        <div class="contact-label">Liên hệ mua bản quyền</div>

        <a class="phone" href="tel:+84387392098" aria-label="Gọi mua bản quyền">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.34 1.79.66 2.64a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.44-1.23a2 2 0 0 1 2.11-.45c.85.32 1.74.54 2.64.66A2 2 0 0 1 22 16.92z" />
          </svg>
          +84 387 392 098
        </a>

        <p class="note">
          Số điện thoại: +84387392098
        </p>
      </div>

      <footer>
        © 2026 AnonTokenX
      </footer>
    </section>
  </main>
</body>
</html>
